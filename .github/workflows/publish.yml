name: Release Archives

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x, 25.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Run tests
        run: npm test

  build-archives:
    name: Build release archives
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Read package version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="${{ steps.version.outputs.version }}"

          echo "Release tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Create release archives
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BASENAME="ffhn-${VERSION}"

          mkdir -p dist
          git archive --format=zip --prefix="${BASENAME}/" -o "dist/${BASENAME}.zip" HEAD
          git archive --format=tar.gz --prefix="${BASENAME}/" -o "dist/${BASENAME}.tar.gz" HEAD

          ls -la dist/

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  upload-release-assets:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs: build-archives
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download archive artifact
        uses: actions/download-artifact@v4
        with:
          name: release-archives
          path: dist/

      - name: Attach archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          fail_on_unmatched_files: true
